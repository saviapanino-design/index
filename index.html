<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savia - Cajicá</title>
    <style>
        /* Estilos base */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f4f7f4; /* Un tono claro orgánico */
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Animación de fondo (Efecto zoom suave) */
        @keyframes breathing {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .contenedor {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .fondo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("fondo.jpg");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            animation: breathing 10s ease-in-out infinite;
        }

        /* Capa de contenido */
        .contenido {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Texto abajo para no tapar el logo central */
        }

        .mensaje-footer {
            background: rgba(255, 255, 255, 0.85); /* Fondo blanco traslúcido */
            padding: 30px 20px;
            backdrop-filter: blur(8px);
            border-top: 4px solid #4CAF50; /* Verde Savia */
        }

        h1 {
            color: #2e4a2e;
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #555;
            margin: 10px 0 20px;
            font-size: 1.1rem;
        }

        /* Botón de WhatsApp Animado */
        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            margin-bottom: 10px;
        }

        .btn-whatsapp:hover {
            transform: scale(1.1);
            background-color: #128c7e;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .fondo { background-size: 85%; }
            h1 { font-size: 1.2rem; }
            .mensaje-footer { padding: 20px 10px; }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="fondo"></div>
        
        <div class="contenido">
            <div class="mensaje-footer">
                <h1>LO ESTAMOS PREPARANDO TODO PARA TI</h1>
                <p>Savia llegará pronto a Cajicá</p>
                
                <a href="https://wa.me/573000000000?text=Hola%20Savia!%20Quiero%20más%20información" class="btn-whatsapp" target="_blank">
                    Escríbenos por WhatsApp
                </a>
            </div>
        </div>
    </div>

</body>
</html>
