<!DOCTYPE html>

    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        .bg-image {
            /* Cambia 'fondo.jpg' por el nombre de tu imagen */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("fondo.jpg");

        }

</head>
